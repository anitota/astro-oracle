<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дневен Оракул</title>
<link rel="stylesheet" href="style.css">
<script data-goatcounter="https://anitota-orakul.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">
  <div class="top-controls">
    <div class="lang-switch" id="langSwitch"></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Смени темата"></button>
  </div>

  <div class="eyebrow" id="eyebrow"></div>
  <h1 id="title"></h1>
  <div class="date-line" id="dateLine"></div>

  <div class="feature-menu" id="featureMenu"></div>
  <div class="moon-reveal" id="moonReveal" style="display:none;"></div>

  <div id="onboarding">
    <p class="wheel-intro" id="wheelIntro"></p>
    <div class="zodiac-grid" id="zodiacGrid"></div>
  </div>

  <div id="dashboard">
    <div class="profile-row">
      <span id="profileLabel"></span>
      <button class="change-sign" id="changeSign"></button>
    </div>

    <div class="panels">
      <div class="tarot-panel">
        <div class="section-label" id="cardOfDayLabel"></div>
        <div class="card-stage" id="cardStage">
          <div class="card-inner" id="cardInner">
            <div class="card-face card-back">
              <div class="card-back-symbol">✦</div>
            </div>
            <div class="card-face card-front" id="cardFront">
              <div class="card-front-inner">
                <div class="card-glyph" id="cardGlyph"></div>
                <div class="card-name" id="cardName"></div>
                <div class="card-orientation" id="cardOrientation"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="card-hint" id="cardHint"></div>
        <div class="card-meaning" id="cardMeaning" style="display:none;"></div>
      </div>

      <div class="text-panels">
        <div class="text-card">
          <h3 id="horoscopeHeading"></h3>
          <p id="horoscopeText"></p>
        </div>
        <div class="text-card">
          <h3 id="astroHeading"></h3>
          <p id="astroText"></p>
          <div class="moon-line">
            <span id="moonPhaseLabelDash"></span>
            <span id="moonEmojiDash"></span>
          </div>
        </div>
        <div class="text-card" id="crystalCard">
          <h3 id="crystalHeading"></h3>
          <p><strong id="crystalStone"></strong></p>
          <p id="crystalDesc"></p>
        </div>
        <div class="text-card" id="ritualCard">
          <h3 id="ritualHeading"></h3>
          <p id="ritualText"></p>
        </div>
      </div>
    </div>

    <div class="history">
      <button class="history-toggle" id="historyToggle"></button>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <footer id="footerText"></footer>
  <div class="social-bar">
    <button class="social-btn" id="likeBtn">
      <span id="likeIcon">♡</span> <span id="likeText">Харесай</span> <span class="like-count" id="likeCount"></span>
    </button>
    <button class="social-btn" id="shareBtn">
      ⤴ <span id="shareText">Сподели</span>
    </button>
  </div>
  <div class="share-toast" id="shareToast"></div>
</div>

<script src="script.js"></script>
</body>
</html>
